name: Deploy to GitHub Pages

# Builds the Vite app and publishes it to GitHub Pages on every push to main.
# One-time setup: repo Settings → Pages → Build and deployment → Source:
# "GitHub Actions".
#
# Notes:
#  - `base` is derived automatically from the repo name so assets resolve at
#    https://<owner>.github.io/<repo>/.
#  - GitHub Pages is static: the /api serverless function does NOT run here.
#    Practice mode works offline, and Firebase multiplayer works from static
#    hosting. For real Anthropic item generation, deploy the function elsewhere
#    (Vercel/Netlify/Cloudflare) and set the VITE_API_BASE_URL repo variable to
#    its URL. Firebase config lives in src/firebase.ts.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancel in-progress runs on new pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        env:
          # Serve from /<repo>/ on the Pages project site.
          VITE_BASE: /${{ github.event.repository.name }}/
          # Optional: external item-generation API (set as a repo variable).
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: npm run build

      - name: Add SPA 404 fallback
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
